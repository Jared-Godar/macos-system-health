name: Bug report
description: Report a reproducible problem with system-health.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve macOS System Health.

        Do not include credentials, email addresses, usernames, hostnames, environment names, absolute workstation paths, or unredacted reports. Report security vulnerabilities through GitHub's private vulnerability reporting instead.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Report mode
        - Maintenance mode
        - LaunchAgent scheduling
        - Email delivery
        - Installation or configuration
        - Development checks or tests
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version
      description: Provide the version number only; do not include a hostname or hardware serial number.
      placeholder: "15.5"
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - Apple Silicon (arm64)
        - Intel (x86_64)
        - Unknown or other
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Describe what happened without pasting an unredacted report.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Provide the smallest safe sequence that reproduces the problem.
      placeholder: |
        1. Run `bin/system-health report`
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: redacted-output
    attributes:
      label: Redacted diagnostic output
      description: Optional. Include only the minimum relevant lines after removing private data and package or environment inventories.
      render: text

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I reviewed this report and removed credentials, personal identifiers, hostnames, environment names, and workstation paths.
          required: true
        - label: This is not a security vulnerability requiring private reporting.
          required: true
