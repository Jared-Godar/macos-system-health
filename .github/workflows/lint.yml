name: quality
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  checks:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - name: Install pinned quality tools
        run: |
          set -euo pipefail
          # Pin the quality toolchain to explicit released versions verified by SHA-256,
          # so a Homebrew rolling upgrade can never turn this gate red with no code change
          # (Issue #81). macos-15 runners are arm64 -> darwin_arm64 builds. Upkeep is
          # MANUAL: dependabot.yml covers github-actions only, never these three. Owner:
          # Jared-Godar; cadence: on CI failure or ~quarterly. To bump: change the version
          # in the URL and its *_sha together (recompute: curl -fsSL <url> | shasum -a 256);
          # a stale checksum fails this step loudly instead of drifting silently. Full
          # contract: AGENTS.md, "Local environment".
          al_url="https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_darwin_arm64.tar.gz"
          al_sha="aba9ced2dee8d27fecca3dc7feb1a7f9a52caefa1eb46f3271ea66b6e0e6953f"
          sc_url="https://github.com/koalaman/shellcheck/releases/download/v0.11.0/shellcheck-v0.11.0.darwin.aarch64.tar.xz"
          sc_sha="56affdd8de5527894dca6dc3d7e0a99a873b0f004d7aabc30ae407d3f48b0a79"
          gl_url="https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_darwin_arm64.tar.gz"
          gl_sha="b40ab0ae55c505963e365f271a8d3846efbc170aa17f2607f13df610a9aeb6a5"
          bindir="$RUNNER_TEMP/pinned-tools"
          mkdir -p "$bindir"

          fetch() {
            # Bounded retry w/ exponential backoff on TRANSIENT failures; fail fast on
            # PERMANENT ones (bad URL / auth); on exhaustion a clear connectivity message,
            # never a bare curl error (AGENTS.md: defensive external calls). $1 url  $2 out.
            local url="$1" out="$2"
            local attempt=1 max=4 delay=2 code rc
            while :; do
              set +e
              code="$(curl -sSL -o "$out" -w '%{http_code}' "$url")"
              rc=$?
              set -e
              code="${code:-000}"
              if [ "$rc" -eq 0 ] && [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
                return 0
              fi
              case "$code" in
                400|401|403|404|405|410)
                  printf '::error::Download failed permanently for %s (HTTP %s): a bad or unauthorized pinned URL, not a transient network fault. Fix the pinned URL/version.\n' "$url" "$code"
                  return 1 ;;
              esac
              if [ "$attempt" -ge "$max" ]; then
                printf '::error::Could not download %s after %s attempts (last HTTP=%s curl=%s). This is an EXTERNAL / CONNECTIVITY condition reaching the GitHub release CDN, not a defect in this repo. Re-run the job; if it persists see https://www.githubstatus.com.\n' "$url" "$max" "$code" "$rc"
                return 1
              fi
              printf 'transient fetch failure for %s (HTTP=%s curl=%s); retry %s of %s in %ss\n' "$url" "$code" "$rc" "$attempt" "$((max - 1))" "$delay" >&2
              sleep "$delay"
              attempt="$((attempt + 1))"
              delay="$((delay * 2))"
            done
          }

          install_pinned() {
            # $1 name  $2 url  $3 sha256  $4 path of the binary within the archive
            local name="$1" url="$2" sha="$3" binpath="$4"
            local archive="$RUNNER_TEMP/$name.archive"
            local dest="$RUNNER_TEMP/$name.extract"
            if ! fetch "$url" "$archive"; then exit 1; fi
            # Integrity gate BEFORE anything reaches PATH. A checksum mismatch is a
            # PERMANENT error (asset changed / tampered) and is never retried.
            if ! printf '%s  %s\n' "$sha" "$archive" | shasum -a 256 -c - >/dev/null 2>&1; then
              printf '::error::Checksum MISMATCH for %s (%s): expected sha256 %s. This is a PERMANENT integrity failure and is not retried. If the version was bumped intentionally, recompute and update the pin.\n' "$name" "$url" "$sha"
              exit 1
            fi
            mkdir -p "$dest"
            tar xf "$archive" -C "$dest"
            install -m 0755 "$dest/$binpath" "$bindir/$name"
          }

          install_pinned actionlint "$al_url" "$al_sha" actionlint
          install_pinned shellcheck "$sc_url" "$sc_sha" shellcheck-v0.11.0/shellcheck
          install_pinned gitleaks   "$gl_url" "$gl_sha" gitleaks
          # Only now — every checksum verified — put the pinned tools on PATH, where
          # scripts/check's require() resolves them in the next step.
          echo "$bindir" >> "$GITHUB_PATH"
          # Fail loudly here, not mid-gate, if a pin did not land or the arch is wrong.
          "$bindir/actionlint" --version
          "$bindir/shellcheck" --version
          "$bindir/gitleaks" version
      - name: Assert the gate runs under the targeted Bash 3.2
        run: |
          set -euo pipefail
          # Permanent, quiet successor to the temporary #81 diagnostic: fail loudly and
          # explanatorily if a future runner image ever ships a /bin/bash that is not the
          # 3.2.x this gate is pinned to, rather than silently testing another version.
          v="$(/bin/bash --version | head -1)"
          case "$v" in
            *"version 3.2."*) printf 'gate Bash OK: %s\n' "$v" ;;
            *) printf '::error::/bin/bash on this runner is not 3.2.x (%s). The Bash-3.2 guarantee for scripts/check (Issue #81) no longer holds; re-evaluate the pin before trusting this gate.\n' "$v"; exit 1 ;;
          esac
      - name: Lint, test, and scan
        # Invoke the gate through /bin/bash explicitly: this bypasses the
        # `#!/usr/bin/env bash` PATH lookup in scripts/check and pins the entrypoint to the
        # system Bash 3.2.57 the project targets. scripts/check threads "$BASH" through its
        # own `bash -n` and `tests/smoke.sh` calls, so every layer runs under 3.2 (Issue #81).
        run: /bin/bash scripts/check --all
