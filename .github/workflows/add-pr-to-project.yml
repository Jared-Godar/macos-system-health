name: Auto-add PR to Project
on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: read
  repository-projects: write

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - name: Extract issue number from PR
        id: extract
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const text = `${pr.title}\n${pr.body || ''}`;
            const match = text.match(/(Fixes|Closes|Resolves)\s+#(\d+)/i);

            if (!match) {
              core.info('No "Fixes/Closes/Resolves #N" found in PR title or body. Skipping project membership check.');
              core.setOutput('issue_number', '');
              return;
            }

            const issueNumber = match[2];
            core.info(`Extracted issue number: ${issueNumber}`);
            core.setOutput('issue_number', issueNumber);

      - name: Check if issue is in project and add PR
        if: steps.extract.outputs.issue_number != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = parseInt('${{ steps.extract.outputs.issue_number }}');
            const projectName = 'macOS System Health Roadmap';

            // Query for the project by name
            const { repository } = await github.graphql(`
              query {
                repository(owner: "${context.repo.owner}", name: "${context.repo.repo}") {
                  projectsV2(first: 10) {
                    nodes {
                      id
                      title
                    }
                  }
                }
              }
            `);

            let projectId = null;
            for (const project of repository.projectsV2.nodes) {
              if (project.title === projectName) {
                projectId = project.id;
                break;
              }
            }

            if (!projectId) {
              core.warning(`Project "${projectName}" not found. Skipping PR membership.`);
              return;
            }

            core.info(`Found project: ${projectName} (${projectId})`);

            // Check if the linked issue is in the project
            const { issue } = await github.graphql(`
              query {
                issue(owner: "${context.repo.owner}", repository: "${context.repo.repo}", number: ${issueNumber}) {
                  id
                  projectsV2(first: 10) {
                    nodes {
                      id
                    }
                  }
                }
              }
            `);

            let issueInProject = false;
            for (const proj of issue.projectsV2.nodes) {
              if (proj.id === projectId) {
                issueInProject = true;
                break;
              }
            }

            if (!issueInProject) {
              core.info(`Issue #${issueNumber} is not in the "${projectName}" project. Skipping PR add.`);
              return;
            }

            core.info(`Issue #${issueNumber} is in the project. Adding PR to project...`);

            // Add the PR to the project
            const { addProjectNextItem } = await github.graphql(`
              mutation {
                addProjectNextItem(input: {
                  projectId: "${projectId}"
                  contentId: "${context.payload.pull_request.node_id}"
                }) {
                  projectNextItem {
                    id
                  }
                }
              }
            `);

            core.info(`Successfully added PR to project: ${addProjectNextItem.projectNextItem.id}`);
